<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent PR Control Center</title>
    <!-- Apply the saved WebTUI theme + UI size before first paint to avoid a flash.
         Keys + defaults mirror src/theme.ts and src/size.ts — keep them in sync. -->
    <script>
      (function () {
        var root = document.documentElement;
        try {
          root.setAttribute(
            "data-webtui-theme",
            localStorage.getItem("agentpr.theme") || "catppuccin-mocha",
          );
          var size = localStorage.getItem("agentpr.size");
          if (size) root.style.setProperty("--font-size", size + "px");
        } catch (e) {
          root.setAttribute("data-webtui-theme", "catppuccin-mocha");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
