packages:
  - "packages/*"
allowBuilds:
  esbuild: true
# Approve the freshly-published Biome packages so a --frozen-lockfile install in
# CI passes pnpm's minimumReleaseAge supply-chain policy (they're newer than the
# default age window). Auto-managed by pnpm; ages out / updates with Biome bumps.
minimumReleaseAgeExclude:
  - "@biomejs/biome@2.5.1"
  - "@biomejs/cli-darwin-arm64@2.5.1"
  - "@biomejs/cli-darwin-x64@2.5.1"
  - "@biomejs/cli-linux-arm64-musl@2.5.1"
  - "@biomejs/cli-linux-arm64@2.5.1"
  - "@biomejs/cli-linux-x64-musl@2.5.1"
  - "@biomejs/cli-linux-x64@2.5.1"
  - "@biomejs/cli-win32-arm64@2.5.1"
  - "@biomejs/cli-win32-x64@2.5.1"
